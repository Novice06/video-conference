<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>WebRTC TP</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── JOIN SCREEN ── */
    #join-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      flex: 1;
    }
    #join-screen h1 { font-size: 1.4rem; margin-bottom: 8px; }
    #join-screen input {
      padding: 10px 14px;
      border-radius: 6px;
      border: 1px solid #333;
      background: #1a1a1a;
      color: #e0e0e0;
      font-size: 1rem;
      width: 260px;
    }
    #join-screen button {
      padding: 10px 32px;
      border-radius: 6px;
      border: none;
      background: #4f46e5;
      color: #fff;
      font-size: 1rem;
      cursor: pointer;
    }
    #join-screen button:hover { background: #4338ca; }

    /* ── MAIN LAYOUT ── */
    #app { display: none; flex: 1; flex-direction: column; overflow: hidden; }

    #toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 16px;
      background: #1a1a1a;
      border-bottom: 1px solid #2a2a2a;
    }
    #toolbar span { font-size: 0.85rem; color: #888; margin-right: auto; }
    #toolbar button {
      padding: 6px 14px;
      border-radius: 6px;
      border: none;
      background: #2a2a2a;
      color: #e0e0e0;
      cursor: pointer;
      font-size: 0.85rem;
    }
    #toolbar button:hover { background: #3a3a3a; }
    #toolbar button.danger { background: #7f1d1d; }
    #toolbar button.danger:hover { background: #991b1b; }
    #toolbar button.active { background: #065f46; }

    #main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── VIDEO GRID ── */
    #video-grid {
      flex: 1;
      display: grid;
      gap: 6px;
      padding: 10px;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      align-content: start;
      overflow-y: auto;
      background: #0f0f0f;
    }

    .video-tile {
      position: relative;
      background: #1a1a1a;
      border-radius: 8px;
      overflow: hidden;
      aspect-ratio: 16/9;
    }
    .video-tile video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .video-tile .label {
      position: absolute;
      bottom: 6px;
      left: 8px;
      font-size: 0.75rem;
      background: rgba(0,0,0,0.6);
      padding: 2px 8px;
      border-radius: 4px;
    }
    .video-tile .muted-icon {
      position: absolute;
      top: 6px;
      right: 8px;
      font-size: 0.75rem;
      background: rgba(180,0,0,0.7);
      padding: 2px 6px;
      border-radius: 4px;
      display: none;
    }

    /* ── SIDEBAR ── */
    #sidebar {
      width: 260px;
      display: flex;
      flex-direction: column;
      background: #141414;
      border-left: 1px solid #2a2a2a;
    }

    #sidebar-tabs {
      display: flex;
      border-bottom: 1px solid #2a2a2a;
    }
    #sidebar-tabs button {
      flex: 1;
      padding: 8px;
      background: none;
      border: none;
      color: #888;
      cursor: pointer;
      font-size: 0.8rem;
      border-bottom: 2px solid transparent;
    }
    #sidebar-tabs button.active {
      color: #e0e0e0;
      border-bottom-color: #4f46e5;
    }

    .tab-content { display: none; flex: 1; flex-direction: column; overflow: hidden; }
    .tab-content.active { display: flex; }

    /* participants */
    #participants-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }
    .participant-item {
      padding: 6px 8px;
      border-radius: 6px;
      font-size: 0.82rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .participant-item:hover { background: #1f1f1f; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #10b981; flex-shrink: 0; }

    /* chat */
    #chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .chat-msg { font-size: 0.8rem; line-height: 1.4; }
    .chat-msg .who { color: #818cf8; font-weight: 600; }
    .chat-msg .time { color: #555; font-size: 0.7rem; margin-left: 4px; }
    #chat-input-row {
      display: flex;
      gap: 6px;
      padding: 8px;
      border-top: 1px solid #2a2a2a;
    }
    #chat-input {
      flex: 1;
      padding: 6px 10px;
      border-radius: 6px;
      border: 1px solid #333;
      background: #1a1a1a;
      color: #e0e0e0;
      font-size: 0.82rem;
    }
    #chat-input-row button {
      padding: 6px 12px;
      border-radius: 6px;
      border: none;
      background: #4f46e5;
      color: #fff;
      cursor: pointer;
      font-size: 0.82rem;
    }

    /* photos tab */
    #photos-panel {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    #photos-panel canvas {
      width: 100%;
      border-radius: 6px;
      border: 1px solid #2a2a2a;
    }
    #photo-controls {
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 8px;
      border-top: 1px solid #2a2a2a;
    }
    #photo-controls select, #photo-controls button {
      width: 100%;
      padding: 6px 10px;
      border-radius: 6px;
      border: 1px solid #333;
      background: #1a1a1a;
      color: #e0e0e0;
      font-size: 0.8rem;
      cursor: pointer;
    }
    #photo-controls button { background: #4f46e5; border: none; }
    #photo-controls button:hover { background: #4338ca; }
  </style>
</head>
<body>

<!-- JOIN SCREEN -->
<div id="join-screen">
  <h1>WebRTC TP — Vidéoconférence</h1>
  <input id="input-username" type="text" placeholder="Votre nom" maxlength="30"/>
  <input id="input-room"     type="text" placeholder="ID de la room" maxlength="30"/>
  <button onclick="joinRoom()">Rejoindre</button>
</div>

<!-- MAIN APP -->
<div id="app">
  <div id="toolbar">
    <span id="room-label">room: —</span>
    <button id="btn-mic"    onclick="toggleMic()">🎤 Micro</button>
    <button id="btn-cam"    onclick="toggleCam()">📷 Caméra</button>
    <button onclick="takePhoto()">📸 Photo</button>
    <button class="danger"  onclick="leaveRoom()">Quitter</button>
  </div>

  <div id="main">
    <div id="video-grid"></div>

    <div id="sidebar">
      <div id="sidebar-tabs">
        <button class="active" onclick="switchTab('participants', this)">Participants</button>
        <button onclick="switchTab('chat', this)">Chat</button>
        <button onclick="switchTab('photos', this)">Photos</button>
      </div>

      <!-- participants -->
      <div id="tab-participants" class="tab-content active">
        <div id="participants-list"></div>
      </div>

      <!-- chat -->
      <div id="tab-chat" class="tab-content">
        <div id="chat-messages"></div>
        <div id="chat-input-row">
          <input id="chat-input" type="text" placeholder="Message…" onkeydown="if(event.key==='Enter') sendChat()"/>
          <button onclick="sendChat()">Envoyer</button>
        </div>
      </div>

      <!-- photos -->
      <div id="tab-photos" class="tab-content">
        <div id="photos-panel"></div>
        <div id="photo-controls">
          <select id="filter-select">
            <option value="none">Aucun filtre</option>
            <option value="grayscale">Niveaux de gris</option>
            <option value="invert">Inversion</option>
            <option value="sepia">Sépia</option>
            <option value="redboost">Boost rouge</option>
            <option value="threshold">Seuillage</option>
          </select>
          <button onclick="applyFilter()">Appliquer le filtre</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- hidden canvas for photo capture -->
<canvas id="snap-canvas" style="display:none"></canvas>

<script src="/socket.io/socket.io.js"></script>
<script src="/app.js"></script>
<script src="/photo.js"></script>
</body>
</html>
